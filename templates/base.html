<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>{% block title %}{% endblock %} | ClubHub</title>

        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        {% block styles%}
        {% endblock %}
    </head>
<body>
     <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/users">Users</a>
        <a href="/auth/signup">SignUp</a>
    </nav>
    
    {% block content %}
    {% endblock %}

    {% block script %}
    {% endblock %}

    <footer>
        <div class="container">
            <div class="row">
                <div class="col-sm-12 col-md-3 col-lg-3">
                    {% block footer_links %}
                    {% endblock %}
                </div>
            </div>
        </div>
        <p>© 2024 Student Club App</p>
    </footer>
</body>
</html>
