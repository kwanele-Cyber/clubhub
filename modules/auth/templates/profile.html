{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h3>{{ user.username }}</h3>
                <p class="text-muted">{{ user.email }}</p>
                <p>Member since: {{ user.created_at.strftime('%B %d, %Y') }}</p>
            </div>
        </div>
    </div>
</div>
