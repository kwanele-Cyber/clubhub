{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2 class="text-center my-4">Admin Dashboard</h2>
    <div class="card">
        <div class="card-header">User Management</div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.id }}</td>
                        <td>{{ user.full_name }}</td>
                        <td>{{ user.email }}</td>
                        <td>{{ user.role }}</td>
                        <td>
                            <a href="{{ url_for('admin.toggle_admin', user_id=user.id) }}" class="btn btn-sm btn-{{ 'warning' if user.role == 'admin' else 'success' }}">
                                {{ 'Remove Admin' if user.role == 'admin' else 'Make Admin' }}
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
